name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test --reporter=json --reporter=html
      continue-on-error: true
    - name: Parse test results and create issues
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Read the JSON test report
          const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'test-results', 'results.json');
          
          if (!fs.existsSync(reportPath)) {
            console.log('No test results found');
            return;
          }
          
          const results = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          const failures = [];
          
          // Collect all failures
          results.suites?.forEach(suite => {
            suite.tests?.forEach(test => {
              if (test.status === 'failed') {
                failures.push({
                  title: test.title,
                  file: test.file,
                  line: test.line,
                  error: test.failureDetails?.[0]?.message || 'Test failed',
                  fullTitle: `${suite.title} > ${test.title}`
                });
              }
            });
          });
          
          if (failures.length === 0) {
            console.log('All tests passed! ✅');
            return;
          }
          
          console.log(`Found ${failures.length} failing tests`);
          
          // Create or update an issue for each failure
          for (const failure of failures) {
            const issueTitle = `❌ Test Failed: ${failure.fullTitle}`;
            const issueBody = `
          ## Test Failure Details
          
          **File:** \`${failure.file}\`
          **Line:** ${failure.line}
          
          ### Error Message
          \`\`\`
          ${failure.error}
          \`\`\`
          
          **Triggered by:** ${context.ref}
          **Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
          
          ---
          *This issue was automatically created by GitHub Actions*
          `;
            
            try {
              // Check if an issue already exists for this test
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'test-failure',
                per_page: 100
              });
              
              const existingIssue = issues.data.find(issue => 
                issue.title.includes(failure.fullTitle)
              );
              
              if (existingIssue) {
                console.log(`Issue already exists for ${failure.fullTitle}: #${existingIssue.number}`);
              } else {
                const issue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issueTitle,
                  body: issueBody,
                  labels: ['test-failure', 'automated'],
                  assignees: []
                });
                console.log(`Created issue #${issue.data.number}: ${failure.fullTitle}`);
              }
            } catch (error) {
              console.error(`Error creating issue for ${failure.fullTitle}:`, error.message);
            }
          }
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
