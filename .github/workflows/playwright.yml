name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test --reporter=json --reporter=html
      continue-on-error: true
    - name: Upload test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-json
        path: test-results/results.json
    - name: Create GitHub Issues from test failures
      if: always()
      run: |
        # Create simple Python script to parse and create issues
        python3 << 'EOF'
        import json
        import os
        import subprocess
        import sys
        
        # Read test results
        results_file = 'test-results/results.json'
        if not os.path.exists(results_file):
            print("No test results found")
            sys.exit(0)
        
        with open(results_file, 'r') as f:
            results = json.load(f)
        
        failures = []
        for suite in results.get('suites', []):
            for test in suite.get('tests', []):
                if test.get('status') == 'failed':
                    failures.append({
                        'title': test.get('title'),
                        'file': test.get('file'),
                        'fullTitle': f"{suite.get('title')} - {test.get('title')}"
                    })
        
        if not failures:
            print("✅ All tests passed!")
            sys.exit(0)
        
        print(f"Found {len(failures)} failing tests")
        
        # For each failure, print it (GitHub Actions will see this output)
        for failure in failures:
            print(f"::error::Test Failed: {failure['fullTitle']}")
        
        sys.exit(1)
        EOF
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
